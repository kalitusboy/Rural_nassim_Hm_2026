name: rural_nassim_hm_2026
description: تطبيق إحصاء 2026 - إحصاء السكن الريفي والربط بالشبكات
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.9.0
  excel: ^4.0.3
  file_picker: ^8.0.0+1
  image_picker: ^1.0.7
  archive: ^3.4.10
  share_plus: ^9.0.0
  intl: ^0.18.0
  open_file: ^3.3.2
  flutter_image_compress: ^2.1.0
  fl_chart: ^0.71.0
  # ── مزامنة WiFi ──────────────────────────────
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  http: ^1.2.0
  shared_preferences: ^2.2.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
